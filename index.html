<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Horizontal Sliders</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      background: #18181b;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 40px 20px;
      gap: 40px;
      overflow-y: auto;
    }

    .section-title {
      color: #a1a1aa;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: -20px;
    }

    .card {
      position: relative;
      width: 384px;
      height: 104px;
      background: #000;
      border-radius: 24px;
      padding: 16px 20px 0;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .card::before,
    .card::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 48px;
      z-index: 30;
      pointer-events: none;
    }
    .card::before {
      left: 0;
      background: linear-gradient(to right, black 40%, transparent);
    }
    .card::after {
      right: 0;
      background: linear-gradient(to left, black 40%, transparent);
    }

    .value-display {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.01em;
      pointer-events: none;
      position: relative;
      z-index: 10;
      height: 28px;
      margin-bottom: 10px;
    }

    .value-display span {
      display: inline-block;
      min-width: 2ch;
      text-align: center;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), opacity 0.1s, color 0.2s;
    }

    .value-display span.at-zero { color: #ef4444; }

    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-5px); }
      30%  { transform: translateX(5px); }
      45%  { transform: translateX(-4px); }
      60%  { transform: translateX(4px); }
      75%  { transform: translateX(-2px); }
      90%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }
    .value-display span.shake {
      animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97) both;
    }

    .slider-container {
      position: relative;
      width: 100%;
      flex: 1;
      cursor: grab;
      user-select: none;
      touch-action: none;
      overflow: hidden;
    }
    .slider-container:active { cursor: grabbing; }

    .tick-strip {
      position: absolute;
      top: 0;
      left: calc(50% - 5px);
      height: 100%;
      display: flex;
      align-items: flex-start;
      padding-top: 4px;
      gap: 0;
      will-change: transform;
    }

    .tick-slot {
      flex-shrink: 0;
      width: 10px;
      display: flex;
      justify-content: center;
    }

    .tick-line {
      border-radius: 1px;
      transition: background 0.1s;
    }

    .tick-line.minor {
      width: 1.5px;
      height: 16px;
      background: #e5e7eb;
      box-shadow: 0 0 3px 1px rgba(255,255,255,0.15);
    }
    .tick-line.major {
      width: 2px;
      height: 22px;
      background: #e5e7eb;
      box-shadow: 0 0 4px 1px rgba(255,255,255,0.22);
    }
    .tick-line.super {
      width: 2px;
      height: 30px;
      background: #e5e7eb;
      box-shadow: 0 0 5px 2px rgba(255,255,255,0.28);
    }

    .indicator {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 100%;
      background: white;
      border-radius: 999px;
      z-index: 20;
      pointer-events: none;
      box-shadow:
        0 0 3px 1px rgba(255,255,255,0.30),
        0 0 8px 2px rgba(255,255,255,0.12);
    }

  </style>
</head>
<body>

<div class="section-title">Original Design</div>
<div class="card">
  <div class="value-display"><span id="val0">0</span></div>
  <div class="slider-container" data-slider="0">
    <div class="tick-strip"></div>
    <div class="indicator"></div>
  </div>
</div>

<div class="section-title">Giant Wheel View - Classic Spoke</div>
<div class="card">
  <div class="value-display"><span id="val1">0</span></div>
  <div class="slider-container" data-slider="1">
    <div class="tick-strip"></div>
    <div class="indicator"></div>
  </div>
</div>

<div class="section-title">Giant Wheel View - Wide Arc</div>
<div class="card">
  <div class="value-display"><span id="val2">0</span></div>
  <div class="slider-container" data-slider="2">
    <div class="tick-strip"></div>
    <div class="indicator"></div>
  </div>
</div>

<div class="section-title">3D Wide Arc - Layered Depth</div>
<div class="card">
  <div class="value-display"><span id="val3">0</span></div>
  <div class="slider-container" data-slider="3">
    <div class="tick-strip"></div>
    <div class="indicator"></div>
  </div>
</div>

<div class="section-title">3D Wide Arc - Perspective Tilt</div>
<div class="card">
  <div class="value-display"><span id="val4">0</span></div>
  <div class="slider-container" data-slider="4">
    <div class="tick-strip"></div>
    <div class="indicator"></div>
  </div>
</div>

<div class="section-title">3D Wide Arc - Chromatic Depth</div>
<div class="card">
  <div class="value-display"><span id="val5">0</span></div>
  <div class="slider-container" data-slider="5">
    <div class="tick-strip"></div>
    <div class="indicator"></div>
  </div>
</div>

<script>
  const TICK_COUNT   = 101;
  const MAX_VALUE    = 100;
  const TICK_PX      = 10;
  const MAX_OFFSET   = MAX_VALUE * TICK_PX;
  const RUBBER_MAX   = 28;
  const PAD = 20;

  const sliders = [];

  function createSlider(index) {
    const container = document.querySelector(`[data-slider="${index}"]`);
    const strip = container.querySelector('.tick-strip');
    const valEl = document.getElementById(`val${index}`);

    let offsetPx = 0;
    let isDragging = false;
    let lastClientX = 0;
    let lastMoveTime = 0;
    let velocityPxS = 0;
    let momentumRAF = null;
    let rubberOffset = 0;
    let rubberRafId = null;
    let shakeDebounce = false;
    let lastDisplayedValue = 0;
    let lastTickValue = 0;

    function makeTick(globalIndex) {
      const slot = document.createElement('div');
      slot.className = 'tick-slot';
      const line = document.createElement('div');
      line.className = 'tick-line';
      const mod = ((globalIndex % 10) + 10) % 10;
      if      (mod === 0) line.classList.add('super');
      else if (mod === 5) line.classList.add('major');
      else                line.classList.add('minor');
      if (globalIndex < 0 || globalIndex >= TICK_COUNT) {
        line.style.opacity = '0.95';
      }
      slot.appendChild(line);
      return slot;
    }

    for (let i = -PAD; i < TICK_COUNT + PAD; i++) {
      strip.appendChild(makeTick(i));
    }
    strip.style.marginLeft = `${-PAD * TICK_PX}px`;

    function apply3DEffect() {
      const containerWidth = container.offsetWidth;
      const centerX = containerWidth / 2;
      const slots = strip.querySelectorAll('.tick-slot');
      const containerRect = container.getBoundingClientRect();

      slots.forEach((slot, idx) => {
        const line = slot.querySelector('.tick-line');
        const slotRect = slot.getBoundingClientRect();
        const slotCenterX = slotRect.left - containerRect.left + slotRect.width / 2;
        const distanceFromCenter = Math.abs(centerX - slotCenterX);
        const maxDistance = containerWidth / 2;
        const normalizedDist = Math.min(distanceFromCenter / maxDistance, 1);

        let scale = 1;
        let opacity = 1;
        let blur = 0;
        let rotation = 0;
        let yOffset = 0;

        if (index === 0) {
          scale = 1;
          opacity = 1;
        }
        else if (index === 1) {
          const curve = Math.cos(normalizedDist * Math.PI / 2);
          scale = 0.2 + curve * 0.8;
          opacity = 0.25 + curve * 0.75;
        }
        else if (index === 2) {
          const wideCurve = Math.pow(Math.cos(normalizedDist * Math.PI / 2.5), 0.7);
          scale = 0.3 + wideCurve * 0.7;
          opacity = 0.35 + wideCurve * 0.65;
        }
        else if (index === 3) {
          const layeredCurve = Math.pow(Math.cos(normalizedDist * Math.PI / 2.5), 0.7);
          scale = 0.25 + layeredCurve * 0.75;
          opacity = 0.3 + layeredCurve * 0.7;
          blur = normalizedDist * 2.5;
          yOffset = normalizedDist * 8;
        }
        else if (index === 4) {
          const perspectiveCurve = Math.pow(Math.cos(normalizedDist * Math.PI / 2.5), 0.8);
          scale = 0.28 + perspectiveCurve * 0.72;
          opacity = 0.32 + perspectiveCurve * 0.68;
          rotation = normalizedDist * 15 * (slotCenterX < centerX ? 1 : -1);
          yOffset = normalizedDist * 6;
        }
        else if (index === 5) {
          const chromaticCurve = Math.pow(Math.cos(normalizedDist * Math.PI / 2.5), 0.75);
          scale = 0.32 + chromaticCurve * 0.68;
          opacity = 0.35 + chromaticCurve * 0.65;
          blur = normalizedDist * 1.8;
          const hueShift = normalizedDist * 120;
          line.style.filter = `blur(${blur}px) hue-rotate(${hueShift}deg)`;
        }

        line.style.transform = `scaleY(${scale}) translateY(${yOffset}px) rotateZ(${rotation}deg)`;
        if (index !== 5) {
          line.style.filter = `blur(${blur}px)`;
        }
        line.style.opacity = opacity;
        line.style.transformOrigin = 'center';
        line.style.transition = 'transform 0.08s ease-out, opacity 0.08s ease-out, filter 0.08s ease-out';
      });
    }

    function getValueFromOffset(px) {
      return Math.max(0, Math.min(MAX_VALUE, Math.round(px / TICK_PX)));
    }

    function snapToNearest(px) {
      const clamped = Math.max(0, Math.min(MAX_OFFSET, px));
      return Math.round(clamped / TICK_PX) * TICK_PX;
    }

    function applyVisualOffset(logical, extra = 0, animate = false) {
      strip.style.transition = animate
        ? 'transform 0.35s cubic-bezier(0.34,1.2,0.64,1)'
        : 'none';
      strip.style.transform = `translateX(${-(logical + extra)}px)`;
      if (index > 0) {
        requestAnimationFrame(apply3DEffect);
      }
    }

    function updateDisplay(val) {
      if (val !== lastDisplayedValue) {
        valEl.style.transform = 'scale(1.2)';
        valEl.style.opacity = '0.7';
        setTimeout(() => {
          valEl.textContent = val;
          valEl.style.transform = 'scale(1)';
          valEl.style.opacity = '1';
        }, 60);
        lastDisplayedValue = val;
      }
      if (val !== lastDisplayedValue && Math.abs(val - lastTickValue) >= 1) {
        playTick();
        triggerHaptic();
        lastTickValue = val;
      }
    }

    function animateRubberReturn() {
      if (rubberRafId) cancelAnimationFrame(rubberRafId);
      const startOffset = rubberOffset;
      const startTime = performance.now();
      const duration = 350;

      function step(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const eased = t === 1 ? 0 : startOffset * (1 - Math.pow(2, -10 * t));
        rubberOffset = eased;
        applyVisualOffset(offsetPx, rubberOffset);
        if (t < 1) rubberRafId = requestAnimationFrame(step);
        else { rubberOffset = 0; applyVisualOffset(offsetPx); }
      }
      rubberRafId = requestAnimationFrame(step);
    }

    function triggerBoundaryFeedback(direction) {
      const PUSH = 8;
      rubberOffset = direction * -PUSH;
      applyVisualOffset(offsetPx, rubberOffset);
      setTimeout(() => animateRubberReturn(), 30);

      if (!shakeDebounce) {
        shakeDebounce = true;
        valEl.classList.add('at-zero', 'shake');
        valEl.textContent = '0';
        lastDisplayedValue = 0;
        setTimeout(() => {
          valEl.classList.remove('shake');
          setTimeout(() => valEl.classList.remove('at-zero'), 600);
          shakeDebounce = false;
        }, 420);
      }
    }

    function startMomentum(initialVelPxS) {
      if (momentumRAF) cancelAnimationFrame(momentumRAF);
      if (Math.abs(initialVelPxS) < 30) {
        const snapped = snapToNearest(offsetPx);
        offsetPx = snapped;
        applyVisualOffset(snapped, 0, true);
        updateDisplay(getValueFromOffset(snapped));
        return;
      }

      let vel = initialVelPxS;
      const FRICTION = 0.92;
      const MIN_VEL = 15;
      let lastTime = performance.now();

      function step(now) {
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        const delta = vel * dt;
        const newOff = offsetPx + delta;

        if (newOff < 0) {
          offsetPx = 0;
          applyVisualOffset(0);
          updateDisplay(0);
          triggerBoundaryFeedback(-1);
          return;
        }
        if (newOff > MAX_OFFSET) {
          offsetPx = MAX_OFFSET;
          applyVisualOffset(MAX_OFFSET);
          updateDisplay(MAX_VALUE);
          return;
        }

        offsetPx = newOff;
        applyVisualOffset(offsetPx);
        updateDisplay(getValueFromOffset(offsetPx));

        vel *= FRICTION;

        if (Math.abs(vel) > MIN_VEL) {
          momentumRAF = requestAnimationFrame(step);
        } else {
          const snapped = snapToNearest(offsetPx);
          offsetPx = snapped;
          applyVisualOffset(snapped, 0, true);
          updateDisplay(getValueFromOffset(snapped));
        }
      }
      momentumRAF = requestAnimationFrame(step);
    }

    function onDragStart(clientX) {
      if (momentumRAF) { cancelAnimationFrame(momentumRAF); momentumRAF = null; }
      if (rubberRafId) { cancelAnimationFrame(rubberRafId); rubberRafId = null; }
      rubberOffset = 0;
      isDragging = true;
      lastClientX = clientX;
      lastMoveTime = performance.now();
      velocityPxS = 0;
      offsetPx = snapToNearest(offsetPx);
    }

    function onDragMove(clientX) {
      if (!isDragging) return;

      const now = performance.now();
      const dt = Math.max(now - lastMoveTime, 1);
      const moveDx = clientX - lastClientX;

      const speed = Math.abs(moveDx) / dt;
      const SENS_MIN = 1.0, SENS_MAX = 5.0, SPEED_SCALE = 1.5;
      const sensitivity = SENS_MIN + (SENS_MAX - SENS_MIN) * Math.min(speed / SPEED_SCALE, 1);

      const rawDelta = -moveDx * sensitivity;
      const desired = offsetPx + rawDelta;

      if (desired < 0) {
        const overshoot = Math.abs(desired);
        rubberOffset = -Math.min(RUBBER_MAX * (1 - Math.exp(-overshoot / (RUBBER_MAX * 2))), RUBBER_MAX);
        applyVisualOffset(0, rubberOffset);
        updateDisplay(0);
      } else if (desired > MAX_OFFSET) {
        offsetPx = MAX_OFFSET;
        rubberOffset = 0;
        applyVisualOffset(MAX_OFFSET);
        updateDisplay(MAX_VALUE);
      } else {
        rubberOffset = 0;
        offsetPx = desired;
        applyVisualOffset(offsetPx);
        updateDisplay(getValueFromOffset(offsetPx));
      }

      const rawVelPxS = -moveDx * sensitivity / (dt / 1000);
      velocityPxS = velocityPxS * 0.6 + rawVelPxS * 0.4;

      lastClientX = clientX;
      lastMoveTime = now;
    }

    function onDragEnd() {
      if (!isDragging) return;
      isDragging = false;

      if (offsetPx <= 0 && rubberOffset < 0) {
        offsetPx = 0;
        triggerBoundaryFeedback(-1);
        return;
      }

      rubberOffset = 0;
      startMomentum(velocityPxS);
    }

    container.addEventListener('mousedown', e => { onDragStart(e.clientX); e.preventDefault(); });
    const moveHandler = e => onDragMove(e.clientX);
    const upHandler = () => onDragEnd();

    container.addEventListener('touchstart', e => {
      onDragStart(e.touches[0].clientX);
      e.preventDefault();
    }, { passive: false });

    const touchMoveHandler = e => {
      if (isDragging) onDragMove(e.touches[0].clientX);
    };

    container._moveHandler = moveHandler;
    container._upHandler = upHandler;
    container._touchMoveHandler = touchMoveHandler;

    window.addEventListener('mousemove', moveHandler);
    window.addEventListener('mouseup', upHandler);
    window.addEventListener('touchmove', touchMoveHandler);
    window.addEventListener('touchend', upHandler);

    if (index > 0) {
      apply3DEffect();
    }

    return {
      container,
      destroy: () => {
        window.removeEventListener('mousemove', moveHandler);
        window.removeEventListener('mouseup', upHandler);
        window.removeEventListener('touchmove', touchMoveHandler);
        window.removeEventListener('touchend', upHandler);
      }
    };
  }

  for (let i = 0; i < 6; i++) {
    sliders.push(createSlider(i));
  }

  let audioCtx = null;
  let selectedSound = 5;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  const SOUNDS = [
    { fn: (ctx) => { const o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine'; o.frequency.setValueAtTime(800,ctx.currentTime); g.gain.setValueAtTime(0.18,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.04); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.04); } },
    { fn: (ctx) => { const o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine'; o.frequency.setValueAtTime(180,ctx.currentTime); o.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+0.06); g.gain.setValueAtTime(0.22,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.06); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.07); } },
    { fn: (ctx) => { const o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine'; o.frequency.setValueAtTime(1200,ctx.currentTime); g.gain.setValueAtTime(0.12,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.035); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.035); } },
    { fn: (ctx) => { const o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine'; o.frequency.value=440; g.gain.setValueAtTime(0.12,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.08); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.08); } },
    { fn: (ctx) => { const o=ctx.createOscillator(),g=ctx.createGain(); o.type='triangle'; o.frequency.value=200; g.gain.setValueAtTime(0.28,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.035); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.035); } },
    { fn: (ctx) => { [[900,0.1],[450,0.06]].forEach(([f,vol]) => { const o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine'; o.frequency.value=f; g.gain.setValueAtTime(vol,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.035); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.035); }); } },
  ];

  function playTick() {
    try { SOUNDS[selectedSound].fn(getAudioCtx()); } catch(e) {}
  }
  function triggerHaptic() {
    if (navigator.vibrate) navigator.vibrate([14,4,14]);
  }
</script>
</body>
</html>
