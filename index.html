<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance — Cell Slider v2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111113;
      --card: #000;
      --border: rgba(255,255,255,0.07);
      --t1: rgba(255,255,255,1);
      --t2: rgba(255,255,255,0.5);
      --t3: rgba(255,255,255,0.25);
      --mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: white;
      padding: 24px 16px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Controls */
    .controls {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 20px;
    }
    .ctrl-title { font-size: 9px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 0.1em; }
    .ctrl-row { display: flex; align-items: center; gap: 10px; }
    .ctrl-row label { font-size: 11px; color: var(--t2); width: 64px; flex-shrink: 0; }
    .ctrl-row input[type=range] { flex: 1; accent-color: white; cursor: pointer; }
    .ctrl-v { font-size: 12px; font-weight: 600; color: white; width: 34px; text-align: right; font-family: var(--mono); }

    /* ── Card H ── */
    .vH {
      width: 100%; max-width: 420px;
      background: var(--card);
      border-radius: 20px;
      padding: 18px 16px 20px;
    }

    /* Header row */
    .vH-head {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 16px;
    }
    .vH-pct {
      font-size: 42px; font-weight: 700;
      letter-spacing: -0.05em; line-height: 1;
    }
    .vH-pct sup { font-size: 16px; font-weight: 400; opacity: 0.35; }
    .vH-head-r { text-align: right; }
    .vH-badge {
      font-size: 11px; font-weight: 600;
      padding: 4px 9px; border-radius: 6px;
      display: inline-block; margin-bottom: 4px;
    }
    .vH-frac {
      font-size: 11px; font-family: var(--mono); color: var(--t2); padding-right: 5px;
      transition: opacity 0.25s ease;
    }
    /* arrow in frac */
    .vH-frac .frac-arrow { color: rgba(255,255,255,0.3); margin: 0 3px; }
    .vH-frac .frac-to { transition: color 0.25s ease; }

    /* ── Scroll wrap with side fades ── */
    .vH-scroll-outer {
      position: relative;
      margin: 0 -4px;
    }
    /* FIX 3: fade masks on left and right */
    .vH-scroll-outer::before,
    .vH-scroll-outer::after {
      content: '';
      position: absolute;
      top: 0; bottom: 6px;
      width: 28px;
      pointer-events: none;
      z-index: 2;
      transition: opacity 0.2s ease;
    }
    .vH-scroll-outer::before {
      left: 0;
      background: linear-gradient(to right, #000 0%, transparent 100%);
      opacity: 0; /* hidden until scrolled */
    }
    .vH-scroll-outer::after {
      right: 0;
      background: linear-gradient(to left, #000 0%, transparent 100%);
      opacity: 1;
    }
    .vH-scroll-outer.at-start::before { opacity: 0; }
    .vH-scroll-outer.at-end::after   { opacity: 0; }
    .vH-scroll-outer.scrolled::before { opacity: 1; }

    .vH-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 4px 6px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .vH-scroll-wrap::-webkit-scrollbar { display: none; }

    .vH-cells {
      display: flex; gap: 3px;
      width: max-content;
      min-width: 100%;
    }

    /* Each column */
    .vH-cell-col {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      flex-shrink: 0;
    }
    .vH-cell-top {
      font-size: 9px; font-weight: 600; font-family: var(--mono);
      line-height: 1; min-height: 11px; text-align: center;
      white-space: nowrap;
    }
    .vH-cell-sq {
      width: 34px; height: 34px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      position: relative; flex-shrink: 0;
      cursor: default;
    }
    .vH-cell-sq-inner {
      width: 100%; height: 100%; border-radius: 5px;
      transition: background 0.3s ease;
    }
    .vH-cell-bot {
      font-size: 9px; font-family: var(--mono);
      line-height: 1; text-align: center;
      white-space: nowrap; min-height: 11px;
    }

    /* Target ring */
    .vH-cell-col.is-target .vH-cell-sq {
      outline: 2px solid rgba(255,255,255,0.5);
      outline-offset: 1px;
    }

    /* Divider */
    .vH-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0 12px;
    }

    /* ── Carousel action zone ── */
    .vH-carousel {
      position: relative;
      overflow: hidden; /* clip sliding panels */
      /* FIX 4: stable height — reserve space for 1 action row + dots */
      min-height: 52px;
    }

    /* slides container */
    .vH-slides {
      display: flex;
      width: 200%; /* two slides */
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    .vH-slides.single {
      width: 100%;
    }

    /* individual slide */
    .vH-slide {
      width: 50%;
      flex-shrink: 0;
    }
    .vH-slides.single .vH-slide {
      width: 100%;
    }

    /* action row inside slide */
    .vH-action-row {
      display: flex; align-items: center; gap: 10px;
    }
    .vH-action-icon {
      font-size: 15px; width: 24px; text-align: center;
      flex-shrink: 0; line-height: 1;
    }
    .vH-action-text {
      flex: 1; font-size: 12px; color: var(--t2); line-height: 1.4;
    }
    .vH-action-text strong { color: white; font-weight: 700; }
    .vH-action-num {
      font-size: 22px; font-weight: 700;
      font-family: var(--mono); flex-shrink: 0;
      min-width: 32px; text-align: right;
    }

    /* convince teacher dimmed */
    .vH-slide.secondary .vH-action-text { color: rgba(255,255,255,0.35); }
    .vH-slide.secondary .vH-action-text strong { color: rgba(255,255,255,0.6); }
    .vH-slide.secondary .vH-action-num { color: rgba(255,255,255,0.3); font-size: 18px; }

    /* ── Dot indicators ── */
    .vH-dots {
      display: flex; justify-content: center; align-items: center;
      gap: 6px;
      margin-top: 12px;
    }
    .vH-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      border: none;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      cursor: pointer;
      flex-shrink: 0;
    }
    .vH-dot.active {
      width: 18px; height: 5px; border-radius: 3px;
      background: white;
    }
    /* hide dots when only 1 slide */
    .vH-dots.hidden { display: none; }

    /* swipe hint arrow — fades in briefly on first render */
    .vH-swipe-hint {
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
      animation: hintFade 2s ease 0.8s forwards;
      opacity: 0;
    }
    @keyframes hintFade {
      0%   { opacity: 0; transform: translateY(-50%) translateX(0); }
      20%  { opacity: 1; transform: translateY(-50%) translateX(-4px); }
      70%  { opacity: 1; transform: translateY(-50%) translateX(-4px); }
      100% { opacity: 0; transform: translateY(-50%) translateX(-4px); }
    }
  </style>
</head>
<body>

<div class="controls">
  <div class="ctrl-title">Values</div>
  <div class="ctrl-row">
    <label>Total</label>
    <input type="range" id="ctrl-total" min="1" max="120" value="60" step="1"/>
    <span class="ctrl-v" id="ctrl-total-val">60</span>
  </div>
  <div class="ctrl-row">
    <label>Attended</label>
    <input type="range" id="ctrl-attended" min="0" max="120" value="42" step="1"/>
    <span class="ctrl-v" id="ctrl-attended-val">42</span>
  </div>
  <div class="ctrl-row">
    <label>Target %</label>
    <input type="range" id="ctrl-target" min="1" max="100" value="75" step="1"/>
    <span class="ctrl-v" id="ctrl-target-val">75%</span>
  </div>
</div>

<div class="vH" id="vH">
  <div class="vH-head">
    <div class="vH-pct" id="vH-pct"></div>
    <div class="vH-head-r">
      <div class="vH-badge" id="vH-badge"></div>
      <div class="vH-frac" id="vH-frac"></div>
    </div>
  </div>

  <div class="vH-scroll-outer" id="vH-scroll-outer">
    <div class="vH-scroll-wrap" id="vH-scroll-wrap">
      <div class="vH-cells" id="vH-cells"></div>
    </div>
  </div>

  <div class="vH-divider"></div>

  <!-- Carousel zone -->
  <div class="vH-carousel" id="vH-carousel">
    <div class="vH-slides" id="vH-slides">
      <div class="vH-slide" id="vH-slide-0"></div>
      <div class="vH-slide" id="vH-slide-1"></div>
    </div>
    <div class="vH-swipe-hint" id="vH-swipe-hint">‹</div>
  </div>
  <div class="vH-dots" id="vH-dots">
    <div class="vH-dot active" id="dot-0" data-idx="0"></div>
    <div class="vH-dot"        id="dot-1" data-idx="1"></div>
  </div>
</div>

<script>
// ── State ──
let currentSlide = 0;
let totalSlides = 1;
let lastCase = 'above';
let lastS = null;

// ── Calc ──
function calc(total, attended, target) {
  const pct = total === 0 ? 0 : Math.round(attended / total * 100);
  if (target === 100 && attended < total)
    return { case:'impossible', pct, attended, total, target };
  if (pct < target) {
    let an = 0;
    while (total+an > 0 && Math.round((attended+an)/(total+an)*100) < target) an++;
    let cn = 0;
    while (total > 0 && Math.round((attended+cn)/total*100) < target) cn++;
    return { case:'below', pct, attended, total, target, attendNeeded:an, convinceNeeded:cn };
  }
  let b = 0;
  while (total+b > 0 && Math.round(attended/(total+b)*100) >= target) b++;
  return { case:'above', pct, attended, total, target, safeBunks: Math.max(0, b-1) };
}

function col(c) {
  if (c==='above')      return { main:'#22c55e', light:'rgba(34,197,94,0.18)',  text:'#4ade80' };
  if (c==='impossible') return { main:'#a855f7', light:'rgba(168,85,247,0.18)', text:'#c084fc' };
  return                       { main:'#ef4444', light:'rgba(239,68,68,0.18)',  text:'#f87171' };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

// Fix 1: blend from a dark muted base → vivid accent color for clear low→high gradient
function gradientColor(mainHex, t) {
  const [r,g,b] = hexToRgb(mainHex);
  // Low end: very dark tinted background (color at ~8% opacity over black)
  const baseR = Math.round(r * 0.12);
  const baseG = Math.round(g * 0.12);
  const baseB = Math.round(b * 0.12);
  // High end: full vivid color
  const outR = Math.round(baseR + (r - baseR) * t);
  const outG = Math.round(baseG + (g - baseG) * t);
  const outB = Math.round(baseB + (b - baseB) * t);
  return `rgb(${outR},${outG},${outB})`;
}

function buildSteps(s) {
  if (s.case==='impossible') return [];
  const rows = [];
  rows.push({ attended: s.attended, total: s.total, pct: s.pct, label:'now', isCurrent:true, isTarget:false });
  if (s.case==='below') {
    for (let i=1; i<=s.attendNeeded; i++) {
      const a = s.attended+i, t = s.total+i;
      const p = Math.round(a/t*100);
      rows.push({ attended:a, total:t, pct:p, label:`+${i}`, isCurrent:false, isTarget: p>=s.target });
      if (p>=s.target) break;
    }
  } else {
    for (let i=1; i<=s.safeBunks+1; i++) {
      const t = s.total+i;
      const p = Math.round(s.attended/t*100);
      rows.push({ attended:s.attended, total:t, pct:p, label:`-${i}`, isCurrent:false, isTarget: i===s.safeBunks });
      if (p < s.target) break;
    }
    if (s.safeBunks===0) rows[rows.length-1].isTarget = true;
  }
  return rows;
}

// Build convince-teacher steps: total stays fixed, attended increases
function buildConvinceSteps(s) {
  const rows = [];
  rows.push({ attended: s.attended, total: s.total, pct: s.pct, label:'now', isCurrent:true, isTarget:false });
  for (let i=1; i<=s.convinceNeeded; i++) {
    const a = s.attended+i;
    const p = Math.round(a/s.total*100);
    rows.push({ attended:a, total:s.total, pct:p, label:`+${i}`, isCurrent:false, isTarget: p>=s.target });
    if (p>=s.target) break;
  }
  return rows;
}

function renderCell(row, i, steps, c) {
  const isTarget = row.isTarget;
  const isCurrent = row.isCurrent;

  let t;
  if (isCurrent) {
    t = 0.08; // very dim — clearly the starting point
  } else if (isTarget) {
    t = 1.0;
  } else {
    // Spread evenly from 0.22 to 0.85 across intermediate steps
    const intermediates = steps.filter(s => !s.isCurrent && !s.isTarget);
    const myIdx = intermediates.findIndex((_, idx) => {
      // match by position in steps array
      return steps.indexOf(intermediates[idx]) === i;
    });
    const count = intermediates.length;
    if (count <= 1) {
      t = 0.5;
    } else {
      const pos = steps.filter(s => !s.isCurrent && !s.isTarget).indexOf(row);
      t = 0.22 + (pos / (count - 1)) * (0.85 - 0.22);
    }
  }

  const bg = gradientColor(c.main, t);

  const topColor = isCurrent
    ? 'rgba(255,255,255,0.25)'
    : isTarget ? c.text
    : `rgba(255,255,255,${0.2 + t * 0.6})`;

  const botColor = isCurrent
    ? 'rgba(255,255,255,0.2)'
    : isTarget ? c.text
    : `rgba(255,255,255,${0.15 + t * 0.5})`;

  const topLabel = row.pct + '%';
  const botLabel = isCurrent ? `${row.attended}/${row.total}` : row.label;

  const targetClass = isTarget ? ' is-target' : '';
  const currentClass = isCurrent ? ' is-current' : '';

  return `<div class="vH-cell-col${targetClass}${currentClass}">
    <div class="vH-cell-top" style="color:${topColor}">${topLabel}</div>
    <div class="vH-cell-sq">
      <div class="vH-cell-sq-inner" style="background:${bg}"></div>
    </div>
    <div class="vH-cell-bot" style="color:${botColor}">${botLabel}</div>
  </div>`;
}

function renderCells(steps, c) {
  let html = '';
  steps.forEach((row, i) => { html += renderCell(row, i, steps, c); });
  return html;
}

// ── Carousel slide logic ──
function goToSlide(idx, s, c) {
  currentSlide = idx;

  // Update cells based on slide
  const steps = idx === 0
    ? buildSteps(s)
    : buildConvinceSteps(s);

  const cellsEl = document.getElementById('vH-cells');
  cellsEl.innerHTML = renderCells(steps, c);

  // Update header fraction
  updateFrac(s, c, idx);

  // Slide transform
  const slidesEl = document.getElementById('vH-slides');
  slidesEl.style.transform = `translateX(${idx === 0 ? '0%' : '-50%'})`;

  // Dot states
  document.querySelectorAll('.vH-dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });

  // Scroll cells to target
  scrollToTarget();
}

function updateFrac(s, c, slideIdx) {
  const fracEl = document.getElementById('vH-frac');
  const from = `${s.attended}/${s.total}`;

  if (s.case === 'impossible') {
    fracEl.innerHTML = from;
    return;
  }

  if (s.case === 'above') {
    // show from → attended/(total+safeBunks)
    const toTotal = s.total + s.safeBunks;
    const toColor = c.text;
    fracEl.innerHTML = `${from}<span class="frac-arrow">→</span><span class="frac-to" style="color:${toColor}">${s.attended}/${toTotal}</span>`;
    return;
  }

  // below: show from → to
  let toAttended, toTotal;
  if (slideIdx === 0) {
    // attend more: both change
    toAttended = s.attended + s.attendNeeded;
    toTotal    = s.total + s.attendNeeded;
  } else {
    // convince: only attended changes, total fixed
    toAttended = s.attended + s.convinceNeeded;
    toTotal    = s.total;
  }

  const toColor = c.text;
  fracEl.innerHTML = `${from}<span class="frac-arrow">→</span><span class="frac-to" style="color:${toColor}">${toAttended}/${toTotal}</span>`;
}

function scrollToTarget() {
  setTimeout(() => {
    const wrap = document.getElementById('vH-scroll-wrap');
    const targetCell = document.querySelector('.vH-cell-col.is-target');
    if (wrap && targetCell) {
      const wrapLeft = wrap.getBoundingClientRect().left;
      const cellLeft = targetCell.getBoundingClientRect().left;
      const scrollTo = wrap.scrollLeft + (cellLeft - wrapLeft) - wrap.clientWidth/2 + targetCell.offsetWidth/2;
      wrap.scrollTo({ left: Math.max(0, scrollTo), behavior: 'smooth' });
    }
  }, 80);
}

// ── Touch swipe: carousel zone only (below the cell strip) ──
let touchStartX = 0;
let touchStartY = 0;
let swipeState = 'idle'; // 'idle' | 'swiping' | 'scrolling'
let swipeTarget = null;

const cardEl = document.getElementById('vH');
const scrollWrapEl = document.getElementById('vH-scroll-wrap');
const carouselEl  = document.getElementById('vH-carousel');

cardEl.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  swipeState  = 'idle';
  swipeTarget = e.target;
}, { passive: true });

cardEl.addEventListener('touchmove', e => {
  if (swipeState !== 'idle') return;
  const dx = Math.abs(e.touches[0].clientX - touchStartX);
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  if (dx < 6 && dy < 6) return; // haven't moved enough yet

  const inScrollArea = scrollWrapEl.contains(swipeTarget);
  const inCarousel   = carouselEl.contains(swipeTarget);

  if (inScrollArea) {
    // Inside cell strip — only hijack when at scroll boundary
    const { scrollLeft, scrollWidth, clientWidth } = scrollWrapEl;
    const atStart = scrollLeft <= 2;
    const atEnd   = scrollLeft + clientWidth >= scrollWidth - 2;
    const goingLeft  = e.touches[0].clientX - touchStartX < 0;
    const goingRight = e.touches[0].clientX - touchStartX > 0;
    if ((goingLeft && atEnd) || (goingRight && atStart)) {
      swipeState = dx > dy ? 'swiping' : 'scrolling';
    } else {
      swipeState = 'scrolling';
    }
  } else if (inCarousel || !inScrollArea) {
    // Anywhere else on the card (carousel zone, header, etc.)
    swipeState = dx > dy ? 'swiping' : 'scrolling';
  }
}, { passive: true });

cardEl.addEventListener('touchend', e => {
  if (swipeState !== 'swiping') { swipeState = 'idle'; return; }
  const dx = e.changedTouches[0].clientX - touchStartX;
  swipeState = 'idle';
  if (Math.abs(dx) < 20) return; // minimum swipe distance
  if (dx < 0 && currentSlide < totalSlides - 1) goToSlide(currentSlide + 1, lastS, col(lastCase));
  if (dx > 0 && currentSlide > 0)               goToSlide(currentSlide - 1, lastS, col(lastCase));
});

// Dot click
document.getElementById('vH-dots').addEventListener('click', e => {
  const dot = e.target.closest('.vH-dot');
  if (!dot) return;
  const idx = parseInt(dot.dataset.idx);
  if (!isNaN(idx)) goToSlide(idx, lastS, col(lastCase));
});

// ── Scroll fade logic ──
const scrollOuter = document.getElementById('vH-scroll-outer');
const scrollWrap = scrollWrapEl; // reuse the already-declared reference
scrollOuter.classList.add('at-start');

scrollWrap.addEventListener('scroll', () => {
  const { scrollLeft, scrollWidth, clientWidth } = scrollWrap;
  scrollOuter.classList.toggle('at-start', scrollLeft < 4);
  scrollOuter.classList.toggle('scrolled', scrollLeft >= 4);
  scrollOuter.classList.toggle('at-end', scrollLeft + clientWidth >= scrollWidth - 4);
}, { passive: true });

// ── Main render ──
function updateVH(s) {
  lastS = s;
  lastCase = s.case;
  const c = col(s.case);

  // Header
  document.getElementById('vH-pct').innerHTML = `${s.pct}<sup>%</sup>`;
  document.getElementById('vH-pct').style.color = c.text;
  const badge = document.getElementById('vH-badge');
  badge.style.background = c.light; badge.style.color = c.text;
  badge.textContent = s.case==='above' ? 'Safe ✓' : s.case==='impossible' ? 'Impossible' : 'Below Target';

  const slidesEl  = document.getElementById('vH-slides');
  const dotsEl    = document.getElementById('vH-dots');
  const hintEl    = document.getElementById('vH-swipe-hint');
  const slide0    = document.getElementById('vH-slide-0');
  const slide1    = document.getElementById('vH-slide-1');

  if (s.case === 'impossible') {
    // Single slide, no dots
    totalSlides = 1;
    slidesEl.classList.add('single');
    dotsEl.classList.add('hidden');
    document.getElementById('dot-1').style.display = '';
    hintEl.style.display = 'none';
    // Reset position
    currentSlide = 0;
    slidesEl.style.transform = 'translateX(0%)';
    slide1.innerHTML = '';
    slide1.className = 'vH-slide';

    slide0.innerHTML = `<div class="vH-action-row">
      <div class="vH-action-icon" style="color:${c.text}">✗</div>
      <div class="vH-action-text" style="color:rgba(255,255,255,0.4)">100% is no longer achievable. Talk to your professor.</div>
    </div>`;
    slide1.innerHTML = '';

    // cells
    const cell = { attended:s.attended, total:s.total, pct:s.pct, label:'now', isCurrent:true, isTarget:false };
    document.getElementById('vH-cells').innerHTML = renderCell(cell, 0, [cell], c);
    updateFrac(s, c, 0);

  } else if (s.case === 'above') {
    // Single slide — show 1 dot (active) to signal carousel exists
    totalSlides = 1;
    slidesEl.classList.add('single');
    dotsEl.classList.remove('hidden');
    // Show only dot-0 active, hide dot-1
    document.getElementById('dot-0').classList.add('active');
    document.getElementById('dot-1').style.display = 'none';
    hintEl.style.display = 'none';
    // Reset position — critical fix for returning from below/convince state
    currentSlide = 0;
    slidesEl.style.transform = 'translateX(0%)';
    slide1.innerHTML = '';
    slide1.className = 'vH-slide';

    slide0.innerHTML = `<div class="vH-action-row">
      <div class="vH-action-icon" style="color:${c.text}">✓</div>
      <div class="vH-action-text">You can <strong>skip ${s.safeBunks} class${s.safeBunks!==1?'es':''}</strong> safely</div>
      <div class="vH-action-num" style="color:${c.text}">${s.safeBunks}</div>
    </div>`;
    slide1.innerHTML = '';

    const steps = buildSteps(s);
    document.getElementById('vH-cells').innerHTML = renderCells(steps, c);
    updateFrac(s, c, 0);

  } else {
    // below — two slides
    totalSlides = 2;
    slidesEl.classList.remove('single');
    dotsEl.classList.remove('hidden');
    document.getElementById('dot-1').style.display = ''; // restore if hidden from above state
    hintEl.style.display = '';

    slide0.innerHTML = `<div class="vH-action-row">
      <div class="vH-action-icon" style="color:${c.text}">↑</div>
      <div class="vH-action-text">Attend <strong>${s.attendNeeded} more class${s.attendNeeded!==1?'es':''}</strong> to reach ${s.target}%</div>
      <div class="vH-action-num" style="color:${c.text}">${s.attendNeeded}</div>
    </div>`;

    slide1.className = 'vH-slide';
    slide1.innerHTML = `<div class="vH-action-row">
      <div class="vH-action-icon" style="color:${c.text}">✦</div>
      <div class="vH-action-text">Or convince teacher to mark <strong>${s.convinceNeeded} absent</strong> as present</div>
      <div class="vH-action-num" style="color:${c.text}">${s.convinceNeeded}</div>
    </div>`;

    // Reset to slide 0 on data change
    currentSlide = 0;
    slidesEl.style.transform = 'translateX(0%)';
    document.getElementById('dot-0').classList.add('active');
    document.getElementById('dot-1').classList.remove('active');

    const steps = buildSteps(s);
    document.getElementById('vH-cells').innerHTML = renderCells(steps, c);
    updateFrac(s, c, 0);
  }

  // Reset scroll fade
  scrollWrap.scrollLeft = 0;
  scrollOuter.classList.add('at-start');
  scrollOuter.classList.remove('scrolled', 'at-end');
  setTimeout(() => {
    const { scrollWidth, clientWidth } = scrollWrap;
    if (scrollWidth <= clientWidth) scrollOuter.classList.add('at-end');
  }, 50);

  scrollToTarget();
}

function updateAll() {
  const total    = parseInt(document.getElementById('ctrl-total').value);
  const attended = Math.min(parseInt(document.getElementById('ctrl-attended').value), total);
  const target   = parseInt(document.getElementById('ctrl-target').value);
  document.getElementById('ctrl-attended').max = total;
  document.getElementById('ctrl-attended-val').textContent = attended;
  document.getElementById('ctrl-total-val').textContent = total;
  document.getElementById('ctrl-target-val').textContent = target + '%';
  const s = calc(total, attended, target);
  updateVH(s);
}

['ctrl-total','ctrl-attended','ctrl-target'].forEach(id =>
  document.getElementById(id).addEventListener('input', updateAll)
);
updateAll();
</script>
</body>
</html>
