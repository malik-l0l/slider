<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #f0f0f0;
      text-align: center;
      font-family: Arial;
      padding: 20px;
    }
    h3 {
      margin-bottom: 16px;
    }
    .video-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }
    .video-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .video-wrap span {
      margin-bottom: 8px;
      font-size: 14px;
      color: #333;
    }
    video {
      width: 300px;
      max-width: 90vw;
    }
  </style>
</head>
<body>
  <h3 id="caption"></h3>
  <div class="video-container" id="videoContainer"></div>

  <script>
    const caption = document.getElementById("caption");
    const container = document.getElementById("videoContainer");

    function isIOS() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function makeVideo(src, type, label) {
      const wrap = document.createElement("div");
      wrap.className = "video-wrap";

      const lbl = document.createElement("span");
      lbl.textContent = label;

      const video = document.createElement("video");
      video.autoplay = true;
      video.muted = true;
      video.setAttribute("playsinline", "");
      video.controls = true;
      video.src = src;
      video.type = type;

      wrap.appendChild(lbl);
      wrap.appendChild(video);
      return wrap;
    }

    if (isIOS()) {
      caption.textContent = "iPhone → showing 2 .mov videos";
      container.appendChild(makeVideo("output.mov",   "video/quicktime", "output.mov"));
      container.appendChild(makeVideo("output_1.mov", "video/quicktime", "output_1.mov"));
    } else {
      caption.textContent = "Android / Desktop → showing 2 .mp4 videos";
      container.appendChild(makeVideo("bunku_the_bunny.mp4",   "video/mp4", "bunku_the_bunny.mp4"));
      container.appendChild(makeVideo("output_1.mp4", "video/quicktime", "output_1.mp4"));
    }
  </script>
</body>
</html>
