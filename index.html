<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #f0f0f0;
      text-align: center;
      font-family: Arial;
    }
    video {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h3 id="caption"></h3>

<video id="player" width="300" autoplay muted playsinline controls>
  Your browser does not support the video tag.
</video>

<script>
  const player = document.getElementById("player");
  const caption = document.getElementById("caption");

  function isIOS() {
    return /iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  if (isIOS()) {
    // iPhone / iOS
    player.src = "output.mov";
    player.type = "video/quicktime";
    caption.textContent = "iphone --> output.mov is playing";
  } else {
    // Android / Desktop
    player.src = "bunku_the_bunny.mp4";
    player.type = "video/mp4";
    caption.textContent = "android --> bunku.mp4 is playing";
  }
</script>

</body>
</html>
